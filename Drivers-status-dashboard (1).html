<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drivers Status</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060c17; --border: rgba(16,185,129,0.15); --green: #10b981;
  --gold: #f59e0b; --blue: #3b82f6; --red: #ef4444; --purple: #a855f7;
  --muted: #64748b; --outage: #f97316;
}
* { font-family:'Cairo',sans-serif; margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:#f1f5f9; min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0; z-index:-1;
  background:
    radial-gradient(ellipse at 5% 5%, rgba(16,185,129,0.09) 0%, transparent 45%),
    radial-gradient(ellipse at 95% 95%, rgba(59,130,246,0.07) 0%, transparent 45%),
    var(--bg);
}
.wrap { max-width:1300px; margin:0 auto; padding:20px; }

/* HEADER */
.hdr {
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  padding:16px 22px; margin-bottom:20px;
  background:rgba(13,24,41,0.95); border:1px solid var(--border); border-radius:18px;
  animation:fadeDown .4s ease;
}
.hdr-logo { width:46px; height:46px; flex-shrink:0; background:linear-gradient(135deg,#10b981,#059669); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
.hdr-info h1 { font-size:18px; font-weight:900; color:white; }
.hdr-info p  { font-size:11px; color:var(--green); margin-top:2px; }
.hdr-right   { margin-right:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.last-update { font-size:11px; color:var(--muted); }

.hdr-btn { padding:8px 16px; border-radius:10px; border:none; cursor:pointer; font-size:12px; font-weight:800; font-family:'Cairo',sans-serif; transition:all .2s; display:flex; align-items:center; gap:6px; }
.btn-refresh { background:linear-gradient(135deg,var(--green),#059669); color:white; }
.btn-refresh:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(16,185,129,0.3); }
.btn-refresh.loading { opacity:.7; pointer-events:none; }
.btn-export { background:rgba(245,158,11,0.1); color:var(--gold); border:1px solid rgba(245,158,11,0.3); }
.btn-export:hover { background:rgba(245,158,11,0.2); transform:translateY(-2px); }
.btn-admin  { background:rgba(168,85,247,0.1); color:var(--purple); border:1px solid rgba(168,85,247,0.3); }
.btn-admin:hover  { background:rgba(168,85,247,0.2); transform:translateY(-2px); }
.btn-exit   { background:rgba(239,68,68,0.15); color:#fca5a5; border:1px solid rgba(239,68,68,0.3); }
.btn-exit:hover { background:rgba(239,68,68,0.25); transform:translateY(-2px); }

/* MONTH BAR */
.month-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; padding:12px 16px; background:rgba(13,24,41,0.9); border:1px solid var(--border); border-radius:14px; align-items:center; animation:fadeDown .45s ease; }
.month-bar label { font-size:12px; color:var(--muted); font-weight:700; margin-left:4px; }
.mbtn { padding:6px 16px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:var(--muted); font-size:12px; font-weight:700; cursor:pointer; transition:all .2s; font-family:'Cairo',sans-serif; }
.mbtn:hover { border-color:var(--green); color:var(--green); }
.mbtn.on { background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(5,150,105,0.15)); border-color:var(--green); color:var(--green); }
.mbtn.latest::after { content:' ●'; color:var(--green); font-size:8px; vertical-align:middle; }

/* ✅ ACTIVE CARD - ENHANCED */
.active-card {
  background:linear-gradient(135deg,rgba(16,185,129,0.25),rgba(5,150,105,0.2));
  border:2px solid rgba(16,185,129,0.5);
  border-radius:16px; padding:16px 22px;
  display:flex; align-items:center; gap:12px; 
  margin-bottom:20px; animation:fadeUp .3s ease;
  box-shadow:0 8px 24px rgba(16,185,129,0.2);
}
.active-card .icon { font-size:24px; }
.active-card .label { font-size:15px; color:#fff; font-weight:800; }
.active-card .count { font-size:32px; font-weight:900; color:#34d399; margin-right:4px; }
.active-card .sub { font-size:12px; color:#a7f3d0; margin-right:8px; }

/* CARDS */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:20px; }
.scard { border-radius:18px; padding:20px; cursor:pointer; transition:transform .25s,box-shadow .25s; position:relative; overflow:hidden; border:1px solid transparent; animation:fadeUp .4s ease both; }
.scard:hover { transform:translateY(-5px); box-shadow:0 16px 40px rgba(0,0,0,0.35); }
.scard.active { transform:translateY(-6px); box-shadow:0 16px 40px rgba(0,0,0,0.4); }
.scard::before { content:''; position:absolute; top:0; right:0; width:90px; height:90px; border-radius:50%; opacity:.1; transform:translate(25px,-25px); }
.scard-on    { background:rgba(16,185,129,0.08);  border-color:rgba(16,185,129,0.25); }
.scard-rest  { background:rgba(59,130,246,0.08);  border-color:rgba(59,130,246,0.25); }
.scard-sick  { background:rgba(239,68,68,0.08);   border-color:rgba(239,68,68,0.25); }
.scard-wait  { background:rgba(245,158,11,0.08);  border-color:rgba(245,158,11,0.25); }
.scard-abs   { background:rgba(239,68,68,0.12);   border-color:rgba(239,68,68,0.35); }
.scard-vac   { background:rgba(168,85,247,0.08);  border-color:rgba(168,85,247,0.25); }
.scard-outage{ background:rgba(249,115,22,0.08);  border-color:rgba(249,115,22,0.25); }
.scard-other { background:rgba(100,116,139,0.08); border-color:rgba(100,116,139,0.25); }
.scard-on.active  { border-color:#10b981; } .scard-rest.active { border-color:#3b82f6; }
.scard-sick.active{ border-color:#ef4444; } .scard-wait.active { border-color:#f59e0b; }
.scard-abs.active { border-color:#fca5a5; } .scard-vac.active  { border-color:#a855f7; }
.scard-outage.active { border-color:var(--outage); }
.scard-on::before    { background:#10b981; } .scard-rest::before { background:#3b82f6; }
.scard-sick::before  { background:#ef4444; } .scard-wait::before { background:#f59e0b; }
.scard-abs::before   { background:#ef4444; } .scard-vac::before  { background:#a855f7; }
.scard-outage::before{ background:var(--outage); }
.scard-other::before { background:#64748b; }
.scard-icon  { font-size:28px; margin-bottom:6px; }
.scard-count { font-size:44px; font-weight:900; line-height:1; margin-bottom:4px; }
.scard-on   .scard-count { color:var(--green); }  .scard-rest .scard-count { color:var(--blue); }
.scard-sick .scard-count { color:var(--red); }    .scard-wait .scard-count { color:var(--gold); }
.scard-abs  .scard-count { color:#fca5a5; }        .scard-vac  .scard-count { color:var(--purple); }
.scard-outage .scard-count { color:var(--outage); }
.scard-other .scard-count { color:var(--muted); }
.scard-label { font-size:13px; font-weight:800; color:white; margin-bottom:2px; }
.scard-sub   { font-size:11px; color:var(--muted); }
.scard-extra { font-size:11px; color:var(--green); font-weight:700; margin-top:5px; }
.scard-pct   { position:absolute; top:14px; left:14px; font-size:11px; font-weight:800; padding:3px 8px; border-radius:8px; background:rgba(255,255,255,0.06); color:var(--muted); }
.scard-arrow { position:absolute; bottom:14px; left:14px; font-size:16px; opacity:.4; transition:all .2s; }
.scard:hover .scard-arrow { opacity:1; transform:translateX(-4px); }

/* TOTAL BAR */
.total-bar { padding:14px 20px; margin-bottom:20px; background:rgba(13,24,41,0.9); border:1px solid var(--border); border-radius:14px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
.total-bar strong { color:white; font-size:15px; }
.progress-wrap { flex:1; min-width:200px; background:rgba(255,255,255,0.05); border-radius:8px; height:8px; overflow:hidden; display:flex; }
.progress-seg  { height:100%; transition:width .7s ease; }

/* PANEL */
.panel { background:rgba(13,24,41,0.95); border:1px solid var(--border); border-radius:18px; overflow:hidden; margin-bottom:20px; animation:fadeUp .3s ease; }
.panel-hdr { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.panel-title { font-size:15px; font-weight:800; display:flex; align-items:center; gap:8px; }
.panel-close { background:rgba(239,68,68,0.15); border:none; color:var(--red); border-radius:8px; padding:6px 14px; cursor:pointer; font-size:13px; font-weight:800; font-family:'Cairo',sans-serif; transition:all .2s; }
.panel-close:hover { background:rgba(239,68,68,0.25); }

.search-wrap { padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.04); display:flex; gap:10px; align-items:center; }
.search-wrap input { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:8px 14px; color:white; font-size:13px; font-family:'Cairo',sans-serif; outline:none; transition:all .2s; }
.search-wrap input:focus { border-color:var(--green); }
.search-clear { background:rgba(255,255,255,0.06); border:none; color:var(--muted); border-radius:8px; padding:7px 12px; cursor:pointer; font-size:12px; font-family:'Cairo',sans-serif; transition:all .2s; }
.search-clear:hover { color:white; }

.drivers-list { max-height:520px; overflow-y:auto; }
.drivers-list::-webkit-scrollbar { width:4px; }
.drivers-list::-webkit-scrollbar-thumb { background:rgba(16,185,129,0.3); border-radius:4px; }

.driver-row { display:flex; align-items:center; gap:12px; padding:11px 20px; border-bottom:1px solid rgba(255,255,255,0.03); transition:background .15s; }
.driver-row:hover { background:rgba(16,185,129,0.04); }
.driver-num    { font-size:11px; color:var(--muted); width:26px; flex-shrink:0; text-align:center; }

.driver-info   { flex:1; min-width:0; }
.driver-name   { font-size:14px; font-weight:800; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
.driver-meta   { font-size:11px; color:var(--muted); display:flex; gap:6px; flex-wrap:wrap; align-items:center; }

.tag { padding:3px 10px; border-radius:8px; font-size:11px; font-weight:700; background:rgba(255,255,255,0.08); color:#fff; }
.tag-code { background:rgba(245,158,11,0.2); color:var(--gold); font-weight:800; }
.tag-green  { background:rgba(16,185,129,0.2); color:#6ee7b7; }
.tag-gold   { background:rgba(245,158,11,0.2); color:#fbbf24; }
.tag-red    { background:rgba(239,68,68,0.2);  color:#fca5a5; }

/* ✅ ENHANCED COMMENT TAG */
.tag-comment { 
  background:rgba(168,85,247,0.3); color:#fff; 
  font-size:13px; font-weight:700; padding:5px 14px; 
  border-radius:10px; border:1px solid rgba(168,85,247,0.5);
  max-width:300px; white-space:nowrap; overflow:hidden; 
  text-overflow:ellipsis; display:inline-block; vertical-align:middle;
}

/* ✅ ENHANCED END DATE TAG */
.tag-enddate {
  background:rgba(245,158,11,0.25); color:#fbbf24;
  font-size:14px; font-weight:800; padding:5px 14px;
  border-radius:10px; border:1px solid rgba(245,158,11,0.4);
}

.driver-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
.driver-status { padding:4px 10px; border-radius:8px; font-size:11px; font-weight:800; white-space:nowrap; }
.note-btn { background:none; border:1px solid rgba(168,85,247,0.35); color:var(--purple); border-radius:6px; padding:3px 8px; cursor:pointer; font-size:10px; font-weight:700; font-family:'Cairo',sans-serif; transition:all .2s; }
.note-btn:hover { background:rgba(168,85,247,0.15); }

.st-on    { background:rgba(16,185,129,0.15); color:var(--green); }
.st-rest  { background:rgba(59,130,246,0.15); color:var(--blue); }
.st-sick  { background:rgba(239,68,68,0.15);  color:var(--red); }
.st-wait  { background:rgba(245,158,11,0.15); color:var(--gold); }
.st-abs   { background:rgba(239,68,68,0.2);   color:#fca5a5; }
.st-vac   { background:rgba(168,85,247,0.15); color:var(--purple); }
.st-outage{ background:rgba(249,115,22,0.15); color:var(--outage); }
.st-other { background:rgba(100,116,139,0.15);color:var(--muted); }

/* LOADER/ERROR */
.loader { text-align:center; padding:80px 20px; }
.spinner { width:48px; height:48px; border:4px solid rgba(16,185,129,0.2); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
@keyframes spin     { to { transform:rotate(360deg); } }
@keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
@keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:none; } }
.loader p { color:var(--muted); font-size:14px; }
.error-box { text-align:center; padding:60px 20px; }
.error-box .icon { font-size:48px; margin-bottom:12px; }
.error-box p { font-size:14px; color:var(--muted); margin-top:8px; }

/* FOOTER */
.footer { text-align:center; padding:20px; color:var(--muted); font-size:11px; }
.footer span { color:var(--gold); font-weight:800; }

/* ════════════════════════════════
   ADMIN MODAL
════════════════════════════════ */
.modal-overlay { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.75); backdrop-filter:blur(5px); align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.admin-modal { background:#0b1524; border:1px solid rgba(168,85,247,0.3); border-radius:22px; width:100%; max-width:580px; max-height:88vh; overflow:hidden; display:flex; flex-direction:column; animation:slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:none;opacity:1} }

.admin-hdr { padding:16px 22px; border-bottom:1px solid rgba(168,85,247,0.2); display:flex; align-items:center; justify-content:space-between; background:rgba(168,85,247,0.05); }
.admin-hdr h2 { font-size:16px; font-weight:900; color:white; display:flex; align-items:center; gap:8px; }
.modal-close { background:rgba(255,255,255,0.08); border:none; color:var(--muted); border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.modal-close:hover { background:rgba(239,68,68,0.2); color:var(--red); }

.admin-body { padding:20px 22px; overflow-y:auto; flex:1; }

.a-search-wrap { position:relative; margin-bottom:14px; }
.a-search-wrap input { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:10px 16px; color:white; font-size:13px; font-family:'Cairo',sans-serif; outline:none; transition:all .2s; }
.a-search-wrap input:focus { border-color:var(--purple); }
.a-results { position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:10; background:#0d1829; border:1px solid rgba(168,85,247,0.3); border-radius:12px; max-height:180px; overflow-y:auto; }
.a-result { padding:10px 16px; cursor:pointer; transition:background .15s; display:flex; justify-content:space-between; align-items:center; font-size:13px; }
.a-result:hover { background:rgba(168,85,247,0.1); }
.a-result .acode { color:var(--muted); font-size:11px; }

.a-selected { background:rgba(168,85,247,0.08); border:1px solid rgba(168,85,247,0.25); border-radius:14px; padding:14px 16px; margin-bottom:14px; display:none; }
.a-selected.show { display:block; }
.a-sel-name { font-size:15px; font-weight:800; color:white; }
.a-sel-meta { font-size:12px; color:var(--muted); margin-top:2px; }

.a-field { margin-bottom:12px; }
.a-field label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:5px; }
.a-field input, .a-field textarea { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:9px 14px; color:white; font-size:13px; font-family:'Cairo',sans-serif; outline:none; transition:all .2s; resize:vertical; }
.a-field input:focus, .a-field textarea:focus { border-color:var(--purple); background:rgba(255,255,255,0.07); }
.a-field textarea { min-height:65px; }

.a-save { width:100%; padding:11px; border-radius:12px; border:none; cursor:pointer; background:linear-gradient(135deg,var(--purple),#9333ea); color:white; font-size:14px; font-weight:800; font-family:'Cairo',sans-serif; transition:all .2s; margin-top:4px; }
.a-save:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(168,85,247,0.3); }
.a-save:disabled { opacity:.5; pointer-events:none; }

.a-notes-title { font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin:18px 0 10px; }
.a-note-item { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:flex-start; gap:10px; }
.a-note-info { flex:1; min-width:0; }
.a-note-name { font-size:13px; font-weight:700; color:white; }
.a-note-code { font-size:11px; color:var(--muted); margin-bottom:3px; }
.a-note-comment { font-size:12px; color:var(--blue); }
.a-note-date    { font-size:11px; color:var(--gold); margin-top:3px; }
.a-note-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:2px 6px; border-radius:6px; transition:all .2s; flex-shrink:0; }
.a-note-del:hover { color:var(--red); background:rgba(239,68,68,0.1); }
.a-empty { text-align:center; padding:24px; color:var(--muted); font-size:13px; }

/* ════════════════════════════════
   PASSWORD MODAL
════════════════════════════════ */
.pw-overlay { display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.92); backdrop-filter:blur(8px); align-items:center; justify-content:center; }
.pw-overlay.show { display:flex; }
.pw-box { background:linear-gradient(145deg,#0d1525,#111d2e); border:1px solid rgba(239,68,68,0.35); border-radius:22px; padding:40px 36px; text-align:center; max-width:400px; width:90%; box-shadow:0 30px 60px rgba(0,0,0,0.5); animation:slideUp .25s ease; }
.pw-icon { font-size:56px; margin-bottom:16px; }
.pw-title { font-size:19px; font-weight:900; color:#fff; margin-bottom:6px; }
.pw-sub { font-size:12px; color:var(--muted); margin-bottom:24px; }
.pw-inp { width:100%; padding:14px 18px; border-radius:12px; border:2px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); color:#fff; font-size:17px; text-align:center; letter-spacing:3px; outline:none; margin-bottom:18px; box-sizing:border-box; font-family:'Cairo',sans-serif; }
.pw-inp:focus { border-color:var(--red); }
.pw-go { width:100%; padding:14px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--red),#dc2626); color:#fff; font-size:15px; font-weight:800; cursor:pointer; font-family:'Cairo',sans-serif; transition:all .25s; }
.pw-go:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(239,68,68,0.4); }
.pw-err { color:#fca5a5; font-size:12px; font-weight:700; margin-top:14px; display:none; }
.pw-err.show { display:block; }

@media(max-width:700px) {
  .cards-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
  .wrap { padding:10px; }
  .scard { padding:16px 12px; }
  .scard-count { font-size:36px; }
  .hdr { padding:12px 14px; }
  .total-bar { flex-direction:column; align-items:flex-start; gap:10px; }
  .progress-wrap { width:100%; }
  .active-card { flex-direction:column; align-items:flex-start; gap:4px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-logo">🚛</div>
    <div class="hdr-info">
      <h1>Drivers Status</h1>
      <p id="hdrSub">Loading data...</p>
    </div>
    <div class="hdr-right">
      <span class="last-update" id="lastUpdate"></span>
      <button class="hdr-btn" id="themeBtn" onclick="document.body.classList.toggle('light');this.textContent=document.body.classList.contains('light')?'🌙 داكن':'☀️ فاتح'" style="background:rgba(245,158,11,0.12);color:var(--gold)">☀️ فاتح</button>
      <button class="hdr-btn btn-export" id="exportBtn" onclick="exportCSV()" style="display:none">📥 Export</button>
      <button class="hdr-btn btn-exit" id="exitAdminBtn" onclick="exitAdminMode()" style="display:none">🚪 Exit Admin</button>
      <button class="hdr-btn btn-admin" id="adminBtn" onclick="askPassword()">⚙️ Admin</button>
      <button class="hdr-btn btn-refresh" id="refreshBtn" onclick="loadData()">🔄 Refresh</button>
    </div>
  </div>

  <div class="month-bar" id="monthBar" style="display:none">
    <label>📅 Month:</label>
    <div id="monthBtns" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>

  <!-- ✅ ACTIVE DRIVERS CARD -->
  <div class="active-card" id="activeCard" style="display:none">
    <span class="icon">🚛</span>
    <span class="label">السائقين الشغالين</span>
    <span class="count" id="activeCount">0</span>
    <span class="sub">(الإجمالي - خارج الخدمة)</span>
  </div>

  <div id="mainContent">
    <div class="loader"><div class="spinner"></div><p>Loading drivers data...</p></div>
  </div>

  <div class="footer"><p>Drivers Status Dashboard © 2026 🚛 | Powered by <span>Waleed Salah</span></p></div>
</div>

<!-- 🔐 PASSWORD MODAL -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-icon">🔐</div>
    <div class="pw-title">Admin Access</div>
    <div class="pw-sub">Enter password to continue</div>
    <input type="password" class="pw-inp" id="pwInp" placeholder="••••••••" maxlength="20"/>
    <button class="pw-go" onclick="chkPw()">🔓 Unlock Admin Panel</button>
    <div class="pw-err" id="pwErr">❌ Incorrect password!</div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminOverlay" onclick="overlayClick(event)">
  <div class="admin-modal">
    <div class="admin-hdr">
      <h2>⚙️ Admin Panel</h2>
      <button class="modal-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-body">
      <div class="a-search-wrap">
        <input type="text" id="aSearchInput" placeholder="🔍 Search driver by name or code..." oninput="aSearch(this.value)" autocomplete="off"/>
        <div class="a-results" id="aResults" style="display:none"></div>
      </div>
      <div class="a-selected" id="aSelected">
        <div class="a-sel-name" id="aSelName">—</div>
        <div class="a-sel-meta" id="aSelMeta">—</div>
      </div>
      <div class="a-field">
        <label>💬 Comment / Reason</label>
        <textarea id="aComment" placeholder="e.g. Surgery recovery, Annual leave approved by HR..."></textarea>
      </div>
      <div class="a-field">
        <label>🗓 Leave End Date (optional)</label>
        <input type="text" id="aEndDate" placeholder="e.g. 15-Jan-2026"/>
      </div>
      <button class="a-save" id="aSaveBtn" onclick="aSave()" disabled>💾 Save</button>
      <div class="a-notes-title">📋 Saved Notes</div>
      <div id="aNotesList"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ─────────────────────────────────────
var API_URL     = 'https://script.google.com/macros/s/AKfycbwk7fk9WNXTf67-ohsHBaejgMi4MQRAG9GtJ9akgoYJJASanb37GJRPobTM_HZYMaWE/exec';
var STORAGE_KEY = 'drv_admin_notes_v1';
var ADMIN_PASSWORD = 'waleed2026';

// ─── STATE ──────────────────────────────────────
var allData        = {};
var currentMonth   = '';
var activeStatus   = null;
var searchQ        = '';
var adminNotes     = {};
var aSelCode       = null;
var allDriversFlat = [];
var isAdminAuthenticated = false;
var pendingAction  = null;

// ── NOTES STORAGE ─────────────────────────
function loadNotes()  { try { adminNotes = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch(e){ adminNotes={}; } }
function saveNotes()  { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(adminNotes)); } catch(e){} }
loadNotes();

// ── STATUS CONFIG ─────────────────────────
var STATUS_MAP = {
  'ON':       { label:'شغال',           icon:'🚛', cardCls:'scard-on',     avCls:'st-on',     avBg:'rgba(16,185,129,0.15)', avColor:'#10b981' },
  'Rest':     { label:'راحة',           icon:'🛌', cardCls:'scard-rest',   avCls:'st-rest',   avBg:'rgba(59,130,246,0.15)', avColor:'#3b82f6' },
  'Sick':     { label:'مرضى',           icon:'🏥', cardCls:'scard-sick',   avCls:'st-sick',   avBg:'rgba(239,68,68,0.15)',  avColor:'#ef4444' },
  'wait':     { label:'انتظار',         icon:'⏳', cardCls:'scard-wait',   avCls:'st-wait',   avBg:'rgba(245,158,11,0.15)', avColor:'#f59e0b' },
  'Absence':  { label:'غياب',           icon:'🚫', cardCls:'scard-abs',    avCls:'st-abs',    avBg:'rgba(239,68,68,0.2)',   avColor:'#fca5a5' },
  'Vacation': { label:'إجازة',          icon:'🏖️', cardCls:'scard-vac',    avCls:'st-vac',    avBg:'rgba(168,85,247,0.15)', avColor:'#a855f7' },
  'Outage':   { label:'خارج الخدمة',    icon:'🔧', cardCls:'scard-outage', avCls:'st-outage', avBg:'rgba(249,115,22,0.15)', avColor:'#f97316' },
};

function getStatus(raw) {
  if (!raw) return 'ON';
  var r = String(raw).trim();
  if (!r || r === '-' || r === '0' || r === '/') return 'ON';
  if (STATUS_MAP[r]) return r;
  // Skip date-like values (they appear as التاريخ card)
  if (/^\d{1,2}\/\d{1,2}/.test(r) || /^\d{4}-/.test(r) || r === 'التاريخ') return 'ON';
  var low = r.toLowerCase();
  if (low === 'staff') return 'STAFF';
  if (low === 'on')    return 'ON';
  if (low === 'rest' || low === 'd') return 'Rest';
  if (low === 'sick' || low === 's') return 'Sick';
  if (low === 'wait' || low === 'w') return 'wait';
  if (low.includes('abs') || low === 'b') return 'Absence';
  if (low.includes('vac') || low === 'x') return 'Vacation';
  if (low.includes('outage')) return 'Outage';
  if (/^\d+$/.test(r)) return 'ON';
  if (/^\d{1,2}[\/\-]\d{1,2}/.test(r)) return 'ON';
  return r;
}

function getStatusInfo(st) {
  return STATUS_MAP[st] || {label: st, icon:'⚪', cardCls:'scard-other', avCls:'st-other', avBg:'rgba(100,116,139,0.15)', avColor:'#64748b'};
}

function getWorkDays(d) {
  var v = d['T.on']||d['t.on']||d['TON']||d['T_on']||'';
  var n = parseInt(String(v).trim(), 10);
  return isNaN(n) ? null : n;
}

function getEndDate(d) {
  var note = adminNotes[String(d.code)];
  if (note && note.endDate) return note.endDate;
  var s = String(d['تاريخ انتهاء الاجازات']||d['end_date']||'').trim();
  return (s && s !== '0' && s !== '-') ? s : '';
}

function getNote(code) { return adminNotes[String(code)] || null; }

function updateHeader() {
  var exitBtn = document.getElementById('exitAdminBtn');
  exitBtn.style.display = isAdminAuthenticated ? 'flex' : 'none';
}

// ════════════════════════════════════════════
// 🔐 PASSWORD & SESSION FUNCTIONS
// ════════════════════════════════════════════
function askPassword(callback) {
  pendingAction = callback || null;
  document.getElementById('pwOverlay').classList.add('show');
  document.getElementById('pwInp').value = '';
  document.getElementById('pwErr').classList.remove('show');
  setTimeout(function() { document.getElementById('pwInp').focus(); }, 100);
}

function chkPw() {
  var inp = document.getElementById('pwInp').value;
  if (inp === ADMIN_PASSWORD) {
    isAdminAuthenticated = true;
    updateHeader();
    document.getElementById('pwOverlay').classList.remove('show');
    if (pendingAction && typeof pendingAction === 'function') {
      pendingAction(); pendingAction = null;
    } else { openAdmin(); }
  } else {
    document.getElementById('pwErr').classList.add('show');
    document.getElementById('pwInp').value = '';
    document.getElementById('pwInp').focus();
  }
}

document.addEventListener('keypress', function(e) {
  if (e.target && e.target.classList.contains('pw-inp') && e.key === 'Enter') chkPw();
});

document.getElementById('pwOverlay').addEventListener('click', function(e) {
  if (e.target === this) { this.classList.remove('show'); pendingAction = null; }
});

function exitAdminMode() {
  isAdminAuthenticated = false;
  updateHeader();
  closeAdmin();
}

// ─── LOAD DATA ─────────────────────────────
function loadData() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.innerHTML = '⏳ Loading...';
  fetch(API_URL)
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      allData = data; btn.classList.remove('loading'); btn.innerHTML = '🔄 Refresh';
      var now = new Date();
      document.getElementById('lastUpdate').textContent = 'Updated: ' + now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
      var sheets = Object.keys(data);
      if (!sheets.length) { showError('No data found'); return; }
      if (!currentMonth || !data[currentMonth]) currentMonth = sheets[sheets.length - 1];
      var seen = {}; allDriversFlat = [];
      sheets.forEach(function(sh) {
        (data[sh] || []).forEach(function(d) {
          if (d.code && !seen[d.code]) { seen[d.code] = true; allDriversFlat.push(d); }
        });
      });
      buildMonthBar(sheets); renderDashboard();
      document.getElementById('exportBtn').style.display = 'flex';
      document.getElementById('activeCard').style.display = 'flex';
    })
    .catch(function(err) {
      btn.classList.remove('loading'); btn.innerHTML = '🔄 Refresh';
      showError('Failed to load: ' + err.message);
    });
}

function buildMonthBar(sheets) {
  document.getElementById('monthBar').style.display = 'flex';
  var latest = sheets[sheets.length - 1];
  document.getElementById('monthBtns').innerHTML = sheets.map(function(s) {
    return '<button class="mbtn ' + (s === currentMonth ? 'on' : '') + ' ' + (s === latest ? 'latest' : '') + '" onclick="selectMonth(\'' + s + '\')">' + s + '</button>';
  }).join('');
}

function selectMonth(m) {
  currentMonth = m; activeStatus = null; searchQ = '';
  document.querySelectorAll('.mbtn').forEach(function(b) { b.classList.toggle('on', b.textContent.replace(' ●','').trim() === m); });
  renderDashboard();
}

// ─── RENDER DASHBOARD ──────────────────────
function renderDashboard() {
  var all = allData[currentMonth] || [];
  var drivers = all.filter(function(d) { return getStatus(d.status) !== 'STAFF'; });
  var total = drivers.length;

  var outageCount = 0;
  var counts = {};
  drivers.forEach(function(d) { 
    var st = getStatus(d.status); 
    counts[st] = (counts[st] || 0) + 1; 
    if (st === 'Outage') outageCount++;
  });
  var activeCount = total - outageCount;
  document.getElementById('activeCount').textContent = activeCount;

  var totalWD = 0;
  drivers.forEach(function(d) { if (getStatus(d.status) === 'ON') { var w = getWorkDays(d); if (w) totalWD += w; } });

  document.getElementById('hdrSub').textContent = currentMonth + ' — ' + total + ' Drivers';
  var statusOrder = ['ON', 'Rest', 'Sick', 'wait', 'Vacation', 'Absence', 'Outage'];
  var colors = {'ON':'#10b981','Rest':'#3b82f6','Sick':'#ef4444','wait':'#f59e0b','Vacation':'#a855f7','Absence':'#fca5a5','Outage':'#f97316'};

  var cardsHTML = statusOrder.map(function(st) {
    var cnt = counts[st] || 0; if (!cnt) return '';
    var info = getStatusInfo(st); var pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    var active = activeStatus === st ? ' active' : '';
    var extra = (st === 'ON' && totalWD > 0) ? '<div class="scard-extra">📋 Total work days: ' + totalWD + '</div>' : '';
    return '<div class="scard ' + info.cardCls + active + '" onclick="toggleStatus(\'' + st + '\')">' +
      '<div class="scard-pct">' + pct + '%</div><div class="scard-icon">' + info.icon + '</div>' +
      '<div class="scard-count">' + cnt + '</div><div class="scard-label">' + info.label + '</div>' + extra +
      '<div class="scard-sub">اضغط للعرض</div><div class="scard-arrow">←</div></div>';
  }).join('');

  Object.keys(counts).forEach(function(st) {
    if (statusOrder.indexOf(st) === -1 && counts[st] > 0) {
      var info = getStatusInfo(st); var pct = Math.round(counts[st] / total * 100);
      var active = activeStatus === st ? ' active' : '';
      cardsHTML += '<div class="scard scard-other' + active + '" onclick="toggleStatus(\'' + st + '\')">' +
        '<div class="scard-pct">' + pct + '%</div><div class="scard-icon">' + info.icon + '</div>' +
        '<div class="scard-count">' + counts[st] + '</div><div class="scard-label">' + st + '</div>' +
        '<div class="scard-sub">اضغط للعرض</div><div class="scard-arrow">←</div></div>';
    }
  });

  var progressSegs = statusOrder.map(function(st) {
    var cnt = counts[st] || 0; if (!cnt) return '';
    return '<div class="progress-seg" style="width:' + (cnt/total*100).toFixed(1) + '%;background:' + (colors[st]||'#64748b') + '"></div>';
  }).join('');

  var statsHTML = statusOrder.filter(function(st) { return counts[st]; }).map(function(st) {
    var info = getStatusInfo(st);
    return '<span style="color:' + (colors[st]||'#64748b') + ';font-weight:700">' + info.icon + ' ' + info.label + ': ' + counts[st] + '</span>';
  }).join('<span style="color:rgba(255,255,255,0.1)"> | </span>');

  var panelHTML = activeStatus ? buildPanel(drivers, activeStatus) : '';
  document.getElementById('mainContent').innerHTML =
    '<div class="cards-grid">' + cardsHTML + '</div>' +
    '<div class="total-bar"><strong>Total: ' + total + ' Drivers</strong>' +
    '<div class="progress-wrap">' + progressSegs + '</div>' +
    '<div style="font-size:12px;display:flex;gap:12px;flex-wrap:wrap">' + statsHTML + '</div></div>' + panelHTML;
}

function toggleStatus(st) {
  activeStatus = (activeStatus === st) ? null : st; searchQ = '';
  renderDashboard();
  if (activeStatus) setTimeout(function() { var p = document.querySelector('.panel'); if (p) p.scrollIntoView({behavior:'smooth', block:'start'}); }, 100);
}

// ─── BUILD PANEL ───────────────────────────
function buildPanel(drivers, st) {
  var info = getStatusInfo(st);
  var filtered = drivers.filter(function(d) { return getStatus(d.status) === st; });
  var q = searchQ.toLowerCase();
  if (q) filtered = filtered.filter(function(d) { return (d.name||'').toLowerCase().indexOf(q) >= 0 || String(d.code).indexOf(q) >= 0; });
  var isSick = (st === 'Sick'), isVac = (st === 'Vacation'), isOn = (st === 'ON');

  var rows = filtered.map(function(d, i) {
    var note = getNote(d.code); 
    var endDate = getEndDate(d); 
    var workDays = isOn ? getWorkDays(d) : null;
    
    // ✅ الكود ضمن التاجز مع باقي المعلومات
    var tags = '<span class="tag tag-code">#' + d.code + '</span>';
    if (isOn && workDays !== null) tags += '<span class="tag tag-green">📋 ' + workDays + ' days</span>';
    if (isSick || isVac) {
      if (endDate) tags += '<span class="tag tag-enddate">🗓 انتهاء: ' + endDate + '</span>';
      else tags += '<span class="tag tag-green">✅ Ends this month</span>';
    }
    if (note && note.comment) tags += '<span class="tag-comment" title="' + note.comment + '">💬 ' + note.comment + '</span>';
    
    var codeEsc = String(d.code); 
    var nameEsc = (d.name || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    var noteClick = "if(isAdminAuthenticated){openAdminFor('" + codeEsc + "','" + nameEsc + "')}else{askPassword(function(){openAdminFor('" + codeEsc + "','" + nameEsc + "')})}";
    
    // Remove code from tags
    tags = tags.replace('<span class="tag tag-code">#' + d.code + '</span>', '');
    return '<div class="driver-row">' +
      '<div class="driver-num">' + (i+1) + '</div>' +
      '<div style="font-size:11px;font-weight:800;color:var(--gold);width:52px;flex-shrink:0;text-align:center">' + d.code + '</div>' +
      '<div class="driver-info">' +
        '<div class="driver-name">' + (d.name || '—') + '</div>' +
        '<div class="driver-meta">' + tags + '</div>' +
      '</div>' +
      '<div class="driver-right">' +
        '<div class="driver-status ' + info.avCls + '">' + info.icon + ' ' + info.label + '</div>' +
        '<button class="note-btn" onclick="' + noteClick + '">✏️ Note</button>' +
      '</div></div>';
  }).join('');

  if (!rows) rows = '<div style="text-align:center;padding:40px;color:var(--muted)">لا توجد نتائج</div>';
  return '<div class="panel" id="driversPanel">' +
    '<div class="panel-hdr"><div class="panel-title"><span style="font-size:20px">' + info.icon + '</span><span>' + info.label + ' (' + filtered.length + ' Drivers)</span></div>' +
    '<button class="panel-close" onclick="toggleStatus(\'' + st + '\')">✕ Close</button></div>' +
    '<div class="search-wrap"><input type="text" placeholder="🔍 Search by name or code..." value="' + searchQ + '" oninput="searchQ=this.value;renderDashboard()"/>' +
    (searchQ ? '<button class="search-clear" onclick="searchQ=\'\';renderDashboard()">✕ Clear</button>' : '') + '</div>' +
    '<div class="drivers-list">' + rows + '</div></div>';
}

function exportCSV() {
  var drivers = (allData[currentMonth] || []).filter(function(d) { return getStatus(d.status) !== 'STAFF'; });
  var header = ['#', 'Code', 'Name', 'Status', 'Work Days', 'End Date', 'Comment'];
  var rows = drivers.map(function(d, i) {
    var st = getStatus(d.status); var info = getStatusInfo(st);
    var wd = (st === 'ON') ? (getWorkDays(d) || '') : '';
    var note = getNote(d.code); var end = getEndDate(d); var cmt = note ? (note.comment || '') : '';
    return [i+1, d.code, '"' + (d.name||'') + '"', info.label, wd, end, '"' + cmt + '"'].join(',');
  });
  var csv = [header.join(',')].concat(rows).join('\n');
  var blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob); var a = document.createElement('a'); a.href = url; a.download = 'drivers-' + currentMonth + '.csv'; a.click(); URL.revokeObjectURL(url);
}

// ─── ADMIN PANEL FUNCTIONS ─────────────────
function openAdmin() { document.getElementById('adminOverlay').classList.add('open'); document.body.style.overflow = 'hidden'; renderNotesList(); }
function closeAdmin() { document.getElementById('adminOverlay').classList.remove('open'); document.body.style.overflow = ''; resetAdminForm(); }
function overlayClick(e) { if (e.target === document.getElementById('adminOverlay')) closeAdmin(); }
function openAdminFor(code, name) {
  if (isAdminAuthenticated) { openAdmin(); setTimeout(function() { selectDriver({code: code, name: name}); }, 80); }
  else { askPassword(function() { openAdmin(); setTimeout(function() { selectDriver({code: code, name: name}); }, 80); }); }
}
function resetAdminForm() { aSelCode = null; document.getElementById('aSearchInput').value = ''; document.getElementById('aResults').style.display = 'none'; document.getElementById('aSelected').classList.remove('show'); document.getElementById('aComment').value = ''; document.getElementById('aEndDate').value = ''; document.getElementById('aSaveBtn').disabled = true; }
function aSearch(q) {
  var res = document.getElementById('aResults'); if (!q.trim()) { res.style.display = 'none'; return; }
  var matches = allDriversFlat.filter(function(d) { return (d.name||'').toLowerCase().indexOf(q.toLowerCase()) >= 0 || String(d.code).indexOf(q) >= 0; }).slice(0, 10);
  if (!matches.length) { res.style.display = 'none'; return; }
  res.style.display = 'block'; res.innerHTML = matches.map(function(d) { var nameEsc = (d.name||'').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); return '<div class="a-result" onclick="selectDriver({code:\'' + d.code + '\',name:\'' + nameEsc + '\'})"><span>' + (d.name||'—') + '</span><span class="acode">' + d.code + '</span></div>'; }).join('');
}
function selectDriver(d) {
  aSelCode = String(d.code); document.getElementById('aSearchInput').value = d.name || d.code; document.getElementById('aResults').style.display = 'none'; document.getElementById('aSelName').textContent = d.name || '—'; document.getElementById('aSelMeta').textContent = 'Code: ' + d.code; document.getElementById('aSelected').classList.add('show'); document.getElementById('aSaveBtn').disabled = false;
  var note = adminNotes[aSelCode]; document.getElementById('aComment').value = note ? (note.comment || '') : ''; document.getElementById('aEndDate').value = note ? (note.endDate || '') : '';
}
function aSave() {
  if (!aSelCode) return;
  var comment = document.getElementById('aComment').value.trim(); var endDate = document.getElementById('aEndDate').value.trim();
  if (comment || endDate) adminNotes[aSelCode] = {comment: comment, endDate: endDate}; else delete adminNotes[aSelCode];
  saveNotes(); renderNotesList(); renderDashboard(); resetAdminForm();
  var btn = document.getElementById('aSaveBtn'); btn.innerHTML = '✅ Saved!'; btn.disabled = true; setTimeout(function() { btn.innerHTML = '💾 Save'; }, 1500);
}
function deleteNote(code) { delete adminNotes[code]; saveNotes(); renderNotesList(); renderDashboard(); }
function renderNotesList() {
  var list = document.getElementById('aNotesList'); var keys = Object.keys(adminNotes);
  if (!keys.length) { list.innerHTML = '<div class="a-empty">No notes saved yet</div>'; return; }
  list.innerHTML = keys.map(function(code) {
    var note = adminNotes[code]; var drv = allDriversFlat.find(function(d) { return String(d.code) === code; }); var name = drv ? (drv.name || code) : code;
    return '<div class="a-note-item"><div class="a-note-info"><div class="a-note-name">' + name + '</div><div class="a-note-code">Code: ' + code + '</div>' +
      (note.comment ? '<div class="a-note-comment" style="font-size:13px;color:#fff;font-weight:700">💬 ' + note.comment + '</div>' : '') +
      (note.endDate ? '<div class="a-note-date">🗓 Ends: ' + note.endDate + '</div>' : '') + '</div><button class="a-note-del" onclick="deleteNote(\'' + code + '\')" title="Delete">🗑</button></div>';
  }).join('');
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = '<div class="error-box"><div class="icon">⚠️</div><strong style="color:var(--red);font-size:16px">' + msg + '</strong><p>Check Apps Script settings</p><button onclick="loadData()" style="margin-top:16px;padding:10px 24px;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:10px;color:white;font-size:13px;font-weight:800;cursor:pointer;font-family:Cairo,sans-serif">Retry</button></div>';
}

setInterval(loadData, 5 * 60 * 1000);
loadData();
</script>
</body>
</html>
